<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Perfil</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" href="images/logo/logo_coracao.png" sizes="32x32">
    <link rel="apple-touch-icon" href="images/logo/logo_coracao.png" sizes="180x180">
    <link rel="stylesheet" href="css/perfil.css">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@graph": [
            {
                "@type": "Organization",
                "name": "Tayara Andreza",
                "url": "https://tayaraandreza.com/",
                "logo": "https://tayaraandreza.com/images/logo/TAYARA_logo01.png"
            },
            {
                "@type": "WebSite",
                "name": "Tayara Andreza",
                "url": "https://tayaraandreza.com/",
                "publisher": {
                    "@type": "Organization",
                    "name": "Tayara Andreza",
                    "logo": {
                        "@type": "ImageObject",
                        "url": "https://tayaraandreza.com/images/logo/TAYARA_logo01.png"
                    }
                }
            }
        ]
    }
    </script>
</head>
<body>
    <main class="profile-page">
        <a href="fa-clube.html" class="back-link">← Voltar para Fã Clube</a>

        <section class="profile-card">
            <div class="profile-header">
                <img id="profilePhoto" src="images/fotos/tayara_fans.jpg" alt="Foto de perfil">
                <div>
                    <h1 id="profileName">Fã</h1>
                    <p>Perfil do fã cadastrado na Central de Fãs.</p>
                </div>
            </div>

            <div class="profile-actions" id="profileActions" hidden>
                <button type="button" id="toggleEditBtn" class="action-btn">Editar perfil</button>
                <label for="profilePhotoInput" id="editPhotoBtn" class="action-btn secondary" hidden>Mudar foto</label>
                <input id="profilePhotoInput" type="file" accept="image/*" hidden>
            </div>

            <form id="profileForm" class="profile-form">
                <div class="field-grid">
                    <div>
                        <label for="city">Cidade</label>
                        <input id="city" type="text" placeholder="Digite sua cidade" disabled>
                    </div>
                    <div>
                        <label for="state">Estado</label>
                        <input id="state" type="text" placeholder="Digite seu estado" disabled>
                    </div>
                </div>

                <label for="birthDate">Data de Nascimento</label>
                <input id="birthDate" type="text" placeholder="dd/mm/aaaa" disabled>

                <label for="social">Rede Social</label>
                <input id="social" type="text" placeholder="@seuusuario" disabled>

                <label for="fanclubUrl">URL do Fã Clube</label>
                <input id="fanclubUrl" type="url" placeholder="https://..." disabled>

                <label for="bio">Bio</label>
                <textarea id="bio" rows="5" placeholder="Escreva o que você quer que apareça no seu perfil" disabled></textarea>

                <button type="submit" id="saveProfileBtn" class="action-btn" hidden>Salvar perfil</button>
                <p id="profileMessage" class="profile-message" aria-live="polite"></p>
            </form>
        </section>
    </main>
    <script src="js/perfil.js"></script>
</body>
</html>
