<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Fã</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" href="images/logo/logo_coracao.png" sizes="32x32">
    <link rel="apple-touch-icon" href="images/logo/logo_coracao.png" sizes="180x180">
    <link rel="stylesheet" href="css/cadastro.css">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@graph": [
            {
                "@type": "Organization",
                "name": "Tayara Andreza",
                "url": "https://tayaraandreza.com/",
                "logo": "https://tayaraandreza.com/images/logo/TAYARA_logo01.png"
            },
            {
                "@type": "WebSite",
                "name": "Tayara Andreza",
                "url": "https://tayaraandreza.com/",
                "publisher": {
                    "@type": "Organization",
                    "name": "Tayara Andreza",
                    "logo": {
                        "@type": "ImageObject",
                        "url": "https://tayaraandreza.com/images/logo/TAYARA_logo01.png"
                    }
                }
            }
        ]
    }
    </script>
</head>
<body>
    <main class="fans-layout">
        <section class="fans-photo" aria-label="Foto da Tayara para os fãs">
            <div class="fans-photo-copy">
                <h2></h2>
                <p></p>
            </div>
            <img src="images/fotos/tayara_fans.jpg" alt="Tayara Andreza">
        </section>

        <section class="fans-form-area">
            <div class="fans-card">
                <h1>Criar sua conta</h1>
                <p>Cadastre-se agora e fique por dentro das novidades de Bruno e Marrone.</p>

                <form class="fans-form">
                    <label class="field-label" for="nome">Nome Completo</label>
                    <input id="nome" type="text" placeholder="Digite seu nome" required>

                    <label class="field-label" for="nascimento">Data de Nascimento</label>
                    <input id="nascimento" type="text" placeholder="dd/mm/aaaa" required>

                    <label class="field-label" for="email">E-mail</label>
                    <input id="email" type="email" placeholder="Digite seu email" required>

                    <label class="field-label" for="confirmarEmail">Confirmar E-mail</label>
                    <input id="confirmarEmail" type="email" placeholder="Confirme seu email" required>

                    <label class="field-label" for="telefone">Telefone</label>
                    <input id="telefone" type="tel" placeholder="Digite seu telefone" required>

                    <label class="field-label" for="senha">Senha</label>
                    <input id="senha" type="password" placeholder="Digite sua senha" required>

                    <div class="form-grid">
                        <div>
                            <label class="field-label" for="pais">Pais</label>
                            <select id="pais" required>
                                <option value="Brasil" selected>Brasil</option>
                            </select>
                        </div>

                        <div>
                            <label class="field-label" for="estado">Estado</label>
                            <select id="estado" required>
                                <option value="" selected>Selecione</option>
                            </select>
                        </div>
                    </div>

                    <label class="field-label" for="cidade">Cidade</label>
                    <select id="cidade" required>
                        <option value="" selected>Selecione</option>
                    </select>

                    <label class="terms">
                        <input type="checkbox" required>
                        <span>Eu aceito Termos de Uso do site.</span>
                    </label>

                    <button class="primary-btn" type="submit">Próximo</button>

                    <div class="divider">ou</div>
                    <p class="login-link">Já tem uma conta?<a href="fans.html">Acesse</a></p>
                </form>
            </div>
        </section>
    </main>
    <script src="js/cadastro.js"></script>
</body>
</html>
